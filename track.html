<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeCity | Track Incident</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyBeNe4P0GGmHa51ofEvVWb4IvchDBU28js",
          authDomain: "safetyroute-95eb7.firebaseapp.com",
          projectId: "safetyroute-95eb7",
          storageBucket: "safetyroute-95eb7.firebasestorage.app",
          messagingSenderId: "724427779375",
          appId: "1:724427779375:web:2dadf17792c9b4368945da"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Globalize tools so app.js can see them
        window.db = db;
        window.firebaseTools = { query, where, getDocs, collection };
    </script>
</head>
<body>
    <header><h1>SafeCity</h1></header>
    <main>
        <div class="card">
            <h2>Track Status</h2>
            <div class="input-group">
                <input type="text" id="caseId" placeholder="Enter Token (SC-XXXXXX)">
            </div>
            <button class="main-btn" onclick="trackReport()">Retrieve Status</button>
            <div id="result"></div>
            <div class="nav-container">
                <a href="index.html" class="ghost-btn">← Back to Dashboard</a>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
