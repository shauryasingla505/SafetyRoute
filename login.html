<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeCity | Admin Login</title>
    <style>
        body { margin: 0; background: #0f172a; font-family: sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #6366f1; border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Access</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Sign In</button>
        <p id="err" style="color: #ef4444; font-size: 0.8rem; margin-top: 10px;"></p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyBeNe4P0GGmHa51ofEvVWb4IvchDBU28js", authDomain: "safetyroute-95eb7.firebaseapp.com", projectId: "safetyroute-95eb7" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.login = async () => {
        const e = document.getElementById("email").value;
        const p = document.getElementById("password").value;
        try {
            await signInWithEmailAndPassword(auth, e, p);
            sessionStorage.setItem("admin_active", "true");
            window.location.replace("admin.html");
        } catch (err) {
            document.getElementById("err").innerText = err.message;
        }
    };
</script>
</body>
</html>
